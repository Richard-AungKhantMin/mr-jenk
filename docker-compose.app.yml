# Application Services - Rebuild when code changes
# Contains: Services, API Gateway, Frontend, Nginx
# Depends on infrastructure from docker-compose.infra.yml

services:
  # ==================== Backend Microservices ====================

  discovery-server:
    container_name: discovery-server
    image: buy-02-discovery-server:latest
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-server
      EUREKA_CLIENT_REGISTERWITEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  identity-service:
    container_name: identity-service
    image: buy-02-identity-service:latest
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: identity-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

  product-service:
    container_name: product-service
    image: buy-02-product-service:latest
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: product-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

  media-service:
    container_name: media-service
    image: buy-02-media-service:latest
    build:
      context: ./media-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: media-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - media_uploads:/app/uploads/images
    networks:
      - app-network
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    image: buy-02-api-gateway:latest
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Reverse Proxy (HTTPS/SSL Termination) ====================

  nginx:
    container_name: nginx-reverse-proxy
    image: buy-02-nginx:latest
    build:
      context: .
      dockerfile: nginx-docker/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Frontend ====================

  frontend:
    container_name: frontend
    image: buy-02-frontend:latest
    build:
      context: ./buy-02-frontend
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  app-network:
    name: buy-02-network
    driver: bridge

volumes:
  media_uploads:

