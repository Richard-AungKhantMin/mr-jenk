# SonarQube Project Configuration for buy-02 Microservices
# See documentation: https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# Project identification
sonar.projectKey=buy-02
sonar.projectName=buy-02 Microservices
sonar.projectVersion=1.0.0
sonar.projectDescription=E-commerce microservices platform with code quality monitoring

# Source code paths
sonar.sources=api-gateway/src/main/java,\
  discovery-server/src/main/java,\
  identity-service/src/main/java,\
  media-service/src/main/java,\
  product-service/src/main/java,\
  buy-02-frontend/src

# Test code paths
sonar.tests=api-gateway/src/test/java,\
  discovery-server/src/test/java,\
  identity-service/src/test/java,\
  media-service/src/test/java,\
  product-service/src/test/java,\
  buy-02-frontend/src

# Code coverage reports (JaCoCo for Java)
sonar.java.binaries=api-gateway/target/classes,\
  discovery-server/target/classes,\
  identity-service/target/classes,\
  media-service/target/classes,\
  product-service/target/classes

# Exclude certain files from analysis
sonar.exclusions=**/test/**,**/*Test.java,**/node_modules/**,**/target/**,**/dist/**

# Language settings
sonar.language=java

# Code coverage thresholds
sonar.coverage.exclusions=**/test/**,**/*Test.java

# TypeScript/JavaScript specific settings (for frontend)
sonar.typescript.tsconfigPath=buy-02-frontend/tsconfig.json
sonar.javascript.lcov.reportPaths=buy-02-frontend/coverage/buy-01-frontend/lcov.info

# Quality gate settings
sonar.qualitygate.wait=true

# Issue tracking
sonar.issues.include.sources=true
sonar.issues.include.testSources=true

# Security settings
sonar.security.hotspots.onlyOnBranch=main,develop

# Logging level (change to DEBUG for troubleshooting)
sonar.verbose=false
