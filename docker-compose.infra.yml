# Infrastructure Services - Start once and leave running
# Contains: Zookeeper, Kafka, MongoDB, Jenkins
# Data persists across restarts

services:
  # ==================== Message Queue ====================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user-registered --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-created --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-updated --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-deleted --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic image-uploaded --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-log --replication-factor 1 --partitions 1 &&
        echo 'All topics created successfully.'
      "

  # ==================== Database ====================
  
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: buy01
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== CI/CD ====================
  
  jenkins:
    image: jenkins/jenkins:latest
    container_name: jenkins
    ports:
      - "4000:8080"
      - "50000:50000"
    volumes:
      - ~/jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  jenkins_data:
    driver: local
