name: SonarQube Code Analysis

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build Java microservices
        run: |
          mvn clean install -DskipTests -f api-gateway/pom.xml
          mvn clean install -DskipTests -f discovery-server/pom.xml
          mvn clean install -DskipTests -f identity-service/pom.xml
          mvn clean install -DskipTests -f media-service/pom.xml
          mvn clean install -DskipTests -f product-service/pom.xml

      - name: Build frontend
        run: |
          cd buy-02-frontend
          npm ci
          npm run build

      - name: Run tests
        run: |
          mvn test -f api-gateway/pom.xml
          mvn test -f discovery-server/pom.xml
          mvn test -f identity-service/pom.xml
          mvn test -f media-service/pom.xml
          mvn test -f product-service/pom.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: http://localhost:5000
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=buy-02
            -Dsonar.projectName="buy-02 Microservices"
            -Dsonar.projectVersion=1.0.0
            -Dsonar.sources=api-gateway/src/main,discovery-server/src/main,identity-service/src/main,media-service/src/main,product-service/src/main,buy-02-frontend/src
            -Dsonar.tests=api-gateway/src/test,discovery-server/src/test,identity-service/src/test,media-service/src/test,product-service/src/test
            -Dsonar.java.binaries=api-gateway/target/classes,discovery-server/target/classes,identity-service/target/classes,media-service/target/classes,product-service/target/classes

      - name: Wait for SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Comment PR with SonarQube Results
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ **SonarQube Analysis Complete**\n\nCheck the results: [SonarQube Dashboard](http://localhost:5000/dashboard?id=buy-02)`
              });
            }

  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: sonarqube
    if: always()
    
    steps:
      - name: Check Quality Gate Status
        if: ${{ needs.sonarqube.result == 'failure' }}
        run: |
          echo "❌ Quality Gate Failed"
          echo "Please review and fix the issues reported by SonarQube"
          exit 1
      
      - name: Quality Gate Passed
        if: ${{ needs.sonarqube.result == 'success' }}
        run: echo "✅ Quality Gate Passed"
